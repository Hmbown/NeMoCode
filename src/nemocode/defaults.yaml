# NeMoCode defaults — NVIDIA NIM full catalog
# All model specs verified against April 2026 NVIDIA releases.
# DGX Spark optimized: 128GB unified memory runs Super + Nano concurrently.
# Default model is DeepSeek V4 Pro on NIM (frontier code + reasoning).

