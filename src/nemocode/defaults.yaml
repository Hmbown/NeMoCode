    capabilities: [chat]
    context_window: 8192
    max_output_tokens: 4096
    supports_tools: false
    min_gpu_memory_gb: 4
    min_gpus: 1

# ---------------------------------------------------------------------------
# Formations — matches NVIDIA deployment patterns
# ---------------------------------------------------------------------------
formations:

  # ═══════════════════════════════════════════════════════════════════════════
  # STANDARD FORMATIONS (hosted / any hardware)
  # ═══════════════════════════════════════════════════════════════════════════

  # Default: DeepSeek V4 Pro does everything. The daily driver.
  solo:
    name: "Solo"
    description: "DeepSeek V4 Pro for day-to-day coding. Single model, full tool use."
    slots:
      - role: executor
        endpoint: nim-deepseek-pro
    tools: [fs, git, bash, rg]
    verification_rounds: 0

  # DeepSeek V4 Pro alone (explicit alias of solo for clarity).
  deepseek:
    name: "DeepSeek"
    description: "DeepSeek V4 Pro alone. Frontier code + reasoning, single model."
    slots:
      - role: executor
        endpoint: nim-deepseek-pro
    tools: [fs, git, bash, rg]
    verification_rounds: 0

  # DeepSeek pair: Pro plans / reviews, Flash executes fast subtasks.
  deepseek-pair:
    name: "DeepSeek Pair"
    description: "DeepSeek V4 Pro plans + reviews. V4 Flash executes fast subtasks."
    slots:
      - role: planner
        endpoint: nim-deepseek-pro
      - role: fast
        endpoint: nim-deepseek-flash
      - role: executor
        endpoint: nim-deepseek-pro
      - role: reviewer
        endpoint: nim-deepseek-pro
        reasoning_mode: "low_effort"
    tools: [fs, git, bash, rg]
    verification_rounds: 1

  # DeepSeek + Nemotron Super: pair frontier coder with NVIDIA's reasoner.
  deepseek-nemotron:
    name: "DeepSeek + Nemotron"
    description: "DeepSeek V4 Pro for code + Nemotron 3 Super for review/planning."
    slots:
      - role: planner
        endpoint: nim-super
      - role: executor
        endpoint: nim-deepseek-pro
      - role: reviewer
        endpoint: nim-super
        reasoning_mode: "low_effort"
    tools: [fs, git, bash, rg]
    verification_rounds: 1

  # NVIDIA's recommended Super + Nano pattern.
  # Super handles complex reasoning/planning; Nano handles fast subtasks.
  super-nano:
    name: "Super + Nano"
    description: "Super plans and reviews. Nano executes fast targeted steps."
    slots:
      - role: planner
        endpoint: nim-super
      - role: fast
        endpoint: nim-nano
      - role: executor
        endpoint: nim-super
      - role: reviewer
        endpoint: nim-super
        reasoning_mode: "low_effort"
    tools: [fs, git, bash, rg]
    verification_rounds: 1

  # Retrieval-augmented coding.
  retrieval:
    name: "Retrieval"
    description: "Embed + rerank + Super for RAG-augmented coding."
    slots:
      - role: embed
        endpoint: nim-embed
      - role: rerank
        endpoint: nim-rerank
      - role: executor
        endpoint: nim-super
    tools: [fs, git, bash, rg, http]

  # Document processing.
  doc-ops:
    name: "Doc Ops"
    description: "Parse documents, embed, and reason over them."
    slots:
      - role: parse
        endpoint: nim-parse
      - role: embed
        endpoint: nim-embed
      - role: executor
        endpoint: nim-super
    tools: [fs]

  # ═══════════════════════════════════════════════════════════════════════════
  # DGX SPARK FORMATIONS (all-local, air-gapped capable)
  # ═══════════════════════════════════════════════════════════════════════════

  # Spark daily driver: Super locally, Nano 9B mini-agents.
  spark:
    name: "DGX Spark"
    description: "Super on Spark + Nano 9B mini-agents. Fully local, zero cloud dependency."
    slots:
      - role: planner
        endpoint: spark-nim-super
      - role: fast
        endpoint: spark-nim-nano9b
      - role: executor
        endpoint: spark-nim-super
      - role: reviewer
        endpoint: spark-nim-super
        reasoning_mode: "low_effort"
    tools: [fs, git, bash, rg]
    verification_rounds: 1

  # Spark swarm: Super brain, multiple Nano workers.
  spark-swarm:
    name: "DGX Spark Swarm"
    description: "Super plans and reviews. Nano 30B executes, Nano 9B explores. All local."
    slots:
      - role: planner
        endpoint: spark-nim-super
      - role: fast
        endpoint: spark-nim-nano9b
      - role: executor
        endpoint: spark-nim-nano
      - role: reviewer
        endpoint: spark-nim-super
    tools: [fs, git, bash, rg]
    verification_rounds: 1

  # Spark vision: VLM for screenshots + Super for coding.
  spark-vision:
    name: "DGX Spark Vision"
    description: "VLM reads screenshots/diagrams, Super writes code. All local."
    slots:
      - role: parse
        endpoint: spark-nim-vlm
      - role: executor
        endpoint: spark-nim-super
    tools: [fs, git, bash, rg]
    verification_rounds: 0

  # Spark RAG: full local retrieval pipeline.
  spark-retrieval:
    name: "DGX Spark Retrieval"
    description: "Embed + rerank + Super, all local on Spark."
    slots:
      - role: embed
        endpoint: spark-nim-embed
      - role: rerank
        endpoint: spark-nim-rerank
      - role: executor
        endpoint: spark-nim-super
    tools: [fs, git, bash, rg]

  # Spark full-stack: everything local — vision + retrieval + coding.
  spark-full:
    name: "DGX Spark Full Stack"
    description: "VLM + embed + rerank + Super + Nano. The complete local AI workstation."
    slots:
      - role: parse
        endpoint: spark-nim-vlm
      - role: embed
        endpoint: spark-nim-embed
      - role: rerank
        endpoint: spark-nim-rerank
      - role: planner
        endpoint: spark-nim-super
      - role: fast
        endpoint: spark-nim-nano9b
      - role: executor
        endpoint: spark-nim-super
      - role: reviewer
        endpoint: spark-nim-super
        reasoning_mode: "low_effort"
    tools: [fs, git, bash, rg, http]
    verification_rounds: 1

  # Spark vLLM: Same as spark but using vLLM instead of NIM containers.
  spark-vllm:
    name: "DGX Spark (vLLM)"
    description: "Super NVFP4 + Nano 4B FP8 via vLLM on Spark. Official Nano 4B Spark settings."
    slots:
      - role: planner
        endpoint: spark-vllm-super
      - role: fast
        endpoint: spark-vllm-nano4b
      - role: executor
        endpoint: spark-vllm-super
      - role: reviewer
        endpoint: spark-vllm-super
        reasoning_mode: "low_effort"
    tools: [fs, git, bash, rg]
    verification_rounds: 1

  # Spark llama.cpp: Super via vLLM + official Nano 4B GGUF Q4_K_M fast worker.
  spark-llama-cpp:
    name: "DGX Spark (llama.cpp)"
    description: "Super NVFP4 + Nano 4B GGUF Q4_K_M on Spark."
    slots:
      - role: planner
        endpoint: spark-vllm-super
      - role: fast
        endpoint: spark-llama-cpp-nano4b
      - role: executor
        endpoint: spark-vllm-super
      - role: reviewer
        endpoint: spark-vllm-super
        reasoning_mode: "low_effort"
    tools: [fs, git, bash, rg]
    verification_rounds: 1

  # Spark SGLang: single-backend local Super with long-context override support.
  spark-sglang:
    name: "DGX Spark (SGLang)"
    description: "Super via SGLang on Spark. Best local path for Nemotron 3 Super long context."
    slots:
      - role: planner
        endpoint: spark-sglang-super
      - role: executor
        endpoint: spark-sglang-super
      - role: reviewer
        endpoint: spark-sglang-super
        reasoning_mode: "low_effort"
    tools: [fs, git, bash, rg]
    verification_rounds: 1

  # Spark TensorRT-LLM: native TensorRT serving with Super 120B + Nano 4B.
  spark-trt-llm:
    name: "DGX Spark (TensorRT-LLM)"
    description: "Super 120B + Nano 4B via TensorRT-LLM on Spark."
    slots:
      - role: planner
        endpoint: spark-trt-llm-super
      - role: fast
        endpoint: spark-trt-llm-nano4b
      - role: executor
        endpoint: spark-trt-llm-super
      - role: reviewer
        endpoint: spark-trt-llm-super
        reasoning_mode: "low_effort"
    tools: [fs, git, bash, rg]
    verification_rounds: 1

  # Lightweight local: Nano only on Spark or workstation.
  local:
    name: "Local"
    description: "Nano on local NIM for air-gapped / offline work."
    slots:
      - role: executor
        endpoint: local-nim-nano
    tools: [fs, git, bash, rg]
    verification_rounds: 0

  # ═══════════════════════════════════════════════════════════════════════════
  # SPECIALTY FORMATIONS (hosted)
  # ═══════════════════════════════════════════════════════════════════════════

  # Vision: VLM understands screenshots, Super writes code.
  vision:
    name: "Vision"
    description: "VLM reads screenshots/UI mockups, Super writes the code."
    slots:
      - role: parse
        endpoint: nim-vlm
      - role: executor
        endpoint: nim-super
    tools: [fs, git, bash, rg]
    verification_rounds: 0

  # Deep reasoning: Super with extra verification.
  deep-reason:
    name: "Deep Reasoning"
    description: "Super plans, Nano executes, Super reviews twice. For critical changes."
    slots:
      - role: planner
        endpoint: nim-super
      - role: executor
        endpoint: nim-nano
      - role: reviewer
        endpoint: nim-super
    tools: [fs, git, bash, rg]
    verification_rounds: 2

# ---------------------------------------------------------------------------
# Permissions
# ---------------------------------------------------------------------------
permissions:
  allow_shell: true
  allow_file_write: true
  allow_file_delete: false
  auto_approve_reads: true
  auto_approve_shell: false
  require_confirmation: [bash_exec, file_delete, git_commit]
